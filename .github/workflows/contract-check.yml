name: contract-check
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Validate contract (fixtures/sample-result.json vs schema)
        run: node scripts/check-contract.mjs
      - name: Typecheck (root app)
        run: npm run typecheck
      - name: Test (root app)
        run: npm test

  frontend-typecheck:
    # frontend/ is a separate Next 16 app with its own lockfile. Its unit tests
    # (frontend/src/lib/*.test.ts) already run in the root vitest job above;
    # this job adds the frontend's own TypeScript check.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Typecheck (frontend app)
        run: npx tsc --noEmit
        working-directory: frontend
